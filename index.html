<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合成大西瓜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF6B9D;
    --primary-dark: #E84393;
    --accent: #FDCB6E;
    --bg-top: #FFF5F7;
    --bg-bottom: #E8F4FD;
    --text-dark: #2D3436;
    --text-light: #636E72;
    --card-bg: rgba(255, 255, 255, 0.75);
    --card-border: rgba(255, 255, 255, 0.9);
    --shadow: 0 8px 32px rgba(186, 85, 211, 0.15);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'ZCOOL KuaiLe', 'Baloo 2', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ===== 游戏容器 ===== */
  #game-wrapper {
    position: relative;
    width: 420px;
    height: 700px;
    max-width: 100vw;
    max-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(180deg, #FFF0F5 0%, #E3F2FD 55%, #E0F7FA 100%);
    box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.6) inset;
  }

  /* ===== 装饰背景气泡 ===== */
  #game-wrapper::before,
  #game-wrapper::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  #game-wrapper::before {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,182,193,0.35) 0%, transparent 70%);
    top: -60px; left: -60px;
  }
  #game-wrapper::after {
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(100,181,246,0.25) 0%, transparent 70%);
    bottom: -80px; right: -80px;
  }

  /* ===== 顶部信息栏 ===== */
  #top-bar {
    position: relative;
    z-index: 5;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px 8px;
  }

  .score-panel {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 8px 16px;
    box-shadow: 0 4px 16px rgba(186,85,211,0.1);
    text-align: center;
    min-width: 90px;
  }

  .score-label {
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 1px;
    font-family: 'Baloo 2', sans-serif;
  }

  .score-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary-dark);
    line-height: 1.1;
    font-family: 'Baloo 2', sans-serif;
  }

  .score-panel.best .score-value {
    color: var(--accent);
    font-size: 22px;
  }

  /* ===== 下一个水果预览 ===== */
  #next-preview {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 6px 12px 6px 8px;
    box-shadow: 0 4px 16px rgba(186,85,211,0.1);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #next-preview canvas {
    display: block;
  }

  #next-preview .next-label {
    font-size: 12px;
    color: var(--text-light);
    font-family: 'Baloo 2', sans-serif;
    writing-mode: vertical-rl;
    letter-spacing: 2px;
  }

  /* ===== 游戏画布区 ===== */
  #canvas-container {
    position: relative;
    z-index: 2;
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow: hidden;
  }

  #game-canvas {
    display: block;
    touch-action: none;
    cursor: pointer;
  }

  /* ===== 游戏结束遮罩 ===== */
  #game-over-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(45, 52, 54, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: fadeIn 0.4s ease;
  }

  #game-over-overlay.show {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .game-over-card {
    background: linear-gradient(145deg, #ffffff 0%, #FFF5F7 100%);
    border-radius: 28px;
    padding: 36px 44px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 3px solid rgba(255,255,255,0.8);
  }

  .game-over-title {
    font-size: 38px;
    color: var(--primary-dark);
    margin-bottom: 6px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }

  .game-over-subtitle {
    font-size: 15px;
    color: var(--text-light);
    margin-bottom: 24px;
    font-family: 'Baloo 2', sans-serif;
  }

  .final-scores {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .final-score-box {
    background: linear-gradient(135deg, #FFF0F5, #FCE4EC);
    border-radius: 18px;
    padding: 14px 24px;
    border: 2px solid rgba(255,182,193,0.4);
  }

  .final-score-box .label {
    font-size: 13px;
    color: var(--text-light);
    font-family: 'Baloo 2', sans-serif;
  }

  .final-score-box .value {
    font-size: 32px;
    font-weight: 800;
    color: var(--primary-dark);
    font-family: 'Baloo 2', sans-serif;
    line-height: 1.1;
  }

  .final-score-box.best .value {
    color: var(--accent);
  }

  #restart-btn {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-size: 20px;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(232,67,147,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 2px;
  }

  #restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(232,67,147,0.5);
  }

  #restart-btn:active {
    transform: translateY(1px);
    box-shadow: 0 4px 16px rgba(232,67,147,0.4);
  }

  /* ===== 新纪录提示 ===== */
  #new-record-badge {
    display: none;
    background: linear-gradient(135deg, #FDCB6E, #F39C12);
    color: white;
    font-size: 14px;
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(243,156,18,0.4);
    animation: popIn 0.5s 0.2s both;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
  }

  #new-record-badge.show {
    display: inline-block;
  }

  /* ===== 底部提示 ===== */
  #hint-text {
    position: relative;
    z-index: 5;
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
    padding: 6px 0 10px;
    font-family: 'Baloo 2', sans-serif;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <!-- 顶部信息栏 -->
  <div id="top-bar">
    <div class="score-panel">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="score-value">0</div>
    </div>

    <div id="next-preview">
      <div class="next-label">NEXT</div>
      <canvas id="next-canvas" width="48" height="48"></canvas>
    </div>

    <div class="score-panel best">
      <div class="score-label">BEST</div>
      <div class="score-value" id="best-value">0</div>
    </div>
  </div>

  <!-- 游戏画布 -->
  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- 底部提示 -->
  <div id="hint-text">移动鼠标 / 手指瞄准 · 点击 / 松手掉落</div>

  <!-- 游戏结束遮罩 -->
  <div id="game-over-overlay">
    <div class="game-over-card">
      <div id="new-record-badge">★ 新纪录 ★</div>
      <div class="game-over-title">游戏结束</div>
      <div class="game-over-subtitle">再接再厉，合成大西瓜！</div>
      <div class="final-scores">
        <div class="final-score-box">
          <div class="label">本局得分</div>
          <div class="value" id="final-score">0</div>
        </div>
        <div class="final-score-box best">
          <div class="label">最高纪录</div>
          <div class="value" id="final-best">0</div>
        </div>
      </div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>
</div>

<!-- Matter.js 物理引擎 CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
'use strict';

/* ================================================================
 * 合成大西瓜 · 游戏主程序
 * 技术栈：Matter.js (物理) + Canvas 2D (渲染) + 原生 JS
 * ================================================================ */

const { Engine, World, Bodies, Events, Composite } = Matter;

/* ================================================================
 * 一、配置常量
 * ================================================================ */

// 画布逻辑尺寸（与 CSS 容器匹配）
const CANVAS_WIDTH = 420;
const CANVAS_HEIGHT = 560; // 画布区高度（顶部信息栏占其余空间）

// 警戒线距画布顶部距离
const DANGER_LINE_Y = 120;

// 掉落冷却时间（毫秒）
const DROP_COOLDOWN = 500;

// 物理参数
const GRAVITY_Y = 1;
const FRICTION = 0.005;
const RESTITUTION = 0.2;
const WALL_THICKNESS = 60;

// 水果等级配置：[等级, 名称, 半径, 颜色, 次色(用于纹理/渐变)]
const FRUITS = [
  { level: 1,  name: '葡萄',   radius: 18,  color: '#9B59B6', color2: '#7D3C98', type: 'grape' },
  { level: 2,  name: '樱桃',   radius: 24,  color: '#E74C3C', color2: '#C0392B', type: 'cherry' },
  { level: 3,  name: '橘子',   radius: 32,  color: '#E67E22', color2: '#D35400', type: 'orange' },
  { level: 4,  name: '柠檬',   radius: 40,  color: '#F1C40F', color2: '#D4AC0D', type: 'lemon' },
  { level: 5,  name: '猕猴桃', radius: 50,  color: '#58D68D', color2: '#27AE60', type: 'kiwi' },
  { level: 6,  name: '番茄',   radius: 60,  color: '#EC7063', color2: '#C0392B', type: 'tomato' },
  { level: 7,  name: '桃子',   radius: 72,  color: '#F5B7B1', color2: '#E9967A', type: 'peach' },
  { level: 8,  name: '菠萝',   radius: 84,  color: '#F39C12', color2: '#D68910', type: 'pineapple' },
  { level: 9,  name: '哈密瓜', radius: 96,  color: '#A3E4D7', color2: '#48C9B0', type: 'melon' },
  { level: 10, name: '苹果',   radius: 110, color: '#E74C3C', color2: '#A93226', type: 'apple' },
  { level: 11, name: '西瓜',   radius: 128, color: '#27AE60', color2: '#1E8449', type: 'watermelon' },
];

const MAX_LEVEL = FRUITS.length;       // 11
const WATERMELON_BONUS = 500;          // 合成西瓜额外奖励

// 获取水果配置（level 从 1 开始）
const getFruitConfig = (level) => FRUITS[level - 1];

/* ================================================================
 * 二、工具函数
 * ================================================================ */

/** 随机生成下一个可掉落水果等级 (1~5) */
function randomSpawnLevel() {
  // 让低级水果出现概率更高，增加可玩性
  const weights = [30, 28, 22, 13, 7]; // 葡萄到猕猴桃
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) return i + 1;
  }
  return 1;
}

/** 将颜色调亮（返回 rgba 字符串） */
function lightenColor(hex, amount) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const nr = Math.min(255, Math.round(r + (255 - r) * amount));
  const ng = Math.min(255, Math.round(g + (255 - g) * amount));
  const nb = Math.min(255, Math.round(b + (255 - b) * amount));
  return `rgba(${nr}, ${ng}, ${nb}, 1)`;
}

/** 限制值在 [min, max] 区间 */
function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

/* ================================================================
 * 三、水果绘制器（Canvas 自定义精美绘制）
 * ================================================================ */

const FruitRenderer = {

  /**
   * 绘制水果通用基底：径向渐变 + 高光 + 阴影
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} cx - 中心 x
   * @param {number} cy - 中心 y
   * @param {number} r - 半径
   * @param {object} fruit - 水果配置
   * @param {number} angle - 旋转角度
   * @param {number} scale - 缩放（用于动画）
   */
  draw(ctx, cx, cy, r, fruit, angle = 0, scale = 1) {
    const actualR = Math.max(2, r * scale);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    // 底部柔和阴影
    ctx.save();
    ctx.translate(actualR * 0.12, actualR * 0.18);
    ctx.scale(1, 0.85);
    const shadowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, actualR);
    shadowGrad.addColorStop(0, 'rgba(0,0,0,0.18)');
    shadowGrad.addColorStop(0.7, 'rgba(0,0,0,0.05)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, actualR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 根据类型绘制具体水果
    switch (fruit.type) {
      case 'grape':      this.drawGrape(ctx, actualR, fruit); break;
      case 'cherry':     this.drawCherry(ctx, actualR, fruit); break;
      case 'orange':     this.drawOrange(ctx, actualR, fruit); break;
      case 'lemon':      this.drawLemon(ctx, actualR, fruit); break;
      case 'kiwi':       this.drawKiwi(ctx, actualR, fruit); break;
      case 'tomato':     this.drawTomato(ctx, actualR, fruit); break;
      case 'peach':      this.drawPeach(ctx, actualR, fruit); break;
      case 'pineapple':  this.drawPineapple(ctx, actualR, fruit); break;
      case 'melon':      this.drawMelon(ctx, actualR, fruit); break;
      case 'apple':      this.drawApple(ctx, actualR, fruit); break;
      case 'watermelon': this.drawWatermelon(ctx, actualR, fruit); break;
      default:           this.drawGeneric(ctx, actualR, fruit); break;
    }

    // 顶部高光反射（统一处理，置于纹理之上）
    this.drawHighlight(ctx, actualR);

    ctx.restore();
  },

  /** 顶部高光 */
  drawHighlight(ctx, r) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const hx = -r * 0.3;
    const hy = -r * 0.35;
    const hr = r * 0.55;
    const grad = ctx.createRadialGradient(hx, hy, 0, hx, hy, hr);
    grad.addColorStop(0, 'rgba(255,255,255,0.55)');
    grad.addColorStop(0.4, 'rgba(255,255,255,0.2)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(hx, hy, hr * 0.7, hr * 0.5, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  },

  /** 通用径向渐变圆（基础形状） */
  fillRadialCircle(ctx, r, color, color2) {
    const grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, lightenColor(color, 0.45));
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, color2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 葡萄：紫色球体 + 小细节 */
  drawGrape(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 葡萄表面小点纹理
    ctx.fillStyle = 'rgba(125, 60, 152, 0.25)';
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 + 0.3;
      const px = Math.cos(a) * r * 0.5;
      const py = Math.sin(a) * r * 0.5;
      ctx.beginPath();
      ctx.arc(px, py, r * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
    // 顶部小蒂
    ctx.fillStyle = '#27AE60';
    ctx.beginPath();
    ctx.arc(0, -r * 0.92, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 樱桃：红色球 + 茎 */
  drawCherry(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 樱桃茎
    ctx.strokeStyle = '#27AE60';
    ctx.lineWidth = Math.max(2, r * 0.1);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.85);
    ctx.quadraticCurveTo(r * 0.3, -r * 1.3, r * 0.5, -r * 1.5);
    ctx.stroke();
    // 小叶子
    ctx.fillStyle = '#2ECC71';
    ctx.beginPath();
    ctx.ellipse(r * 0.55, -r * 1.45, r * 0.18, r * 0.1, -0.5, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 橘子：橙色 + 表面凹点 + 顶部蒂 */
  drawOrange(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 表面凹点
    ctx.fillStyle = 'rgba(211, 84, 0, 0.2)';
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      const dist = Math.random() * r * 0.7;
      const px = Math.cos(a) * dist;
      const py = Math.sin(a) * dist;
      ctx.beginPath();
      ctx.arc(px, py, r * 0.04, 0, Math.PI * 2);
      ctx.fill();
    }
    // 顶部蒂
    ctx.fillStyle = '#27AE60';
    ctx.beginPath();
    ctx.arc(0, -r * 0.9, r * 0.1, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 柠檬：黄色椭圆 + 纹理 */
  drawLemon(ctx, r, fruit) {
    const grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, lightenColor(fruit.color, 0.4));
    grad.addColorStop(0.5, fruit.color);
    grad.addColorStop(1, fruit.color2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.95, r * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
    // 两端小尖
    ctx.fillStyle = fruit.color2;
    ctx.beginPath();
    ctx.ellipse(r * 0.9, 0, r * 0.12, r * 0.08, 0, 0, Math.PI * 2);
    ctx.ellipse(-r * 0.9, 0, r * 0.12, r * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();
    // 纹理线
    ctx.strokeStyle = 'rgba(212, 172, 13, 0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.9, r * (0.3 + i * 0.1), 0, 0, Math.PI);
      ctx.stroke();
    }
  },

  /** 猕猴桃：绿色 + 棕色绒毛外皮 + 黑色籽 */
  drawKiwi(ctx, r, fruit) {
    // 外层棕色绒毛
    const outerGrad = ctx.createRadialGradient(0, 0, r * 0.7, 0, 0, r);
    outerGrad.addColorStop(0, '#8B7355');
    outerGrad.addColorStop(1, '#A0826D');
    ctx.fillStyle = outerGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 内部绿色果肉
    const innerGrad = ctx.createRadialGradient(-r * 0.2, -r * 0.2, r * 0.1, 0, 0, r * 0.82);
    innerGrad.addColorStop(0, lightenColor(fruit.color, 0.3));
    innerGrad.addColorStop(0.6, fruit.color);
    innerGrad.addColorStop(1, '#2ECC71');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.82, 0, Math.PI * 2);
    ctx.fill();
    // 中心白色
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.15, 0, Math.PI * 2);
    ctx.fill();
    // 黑色籽（放射状）
    ctx.fillStyle = '#1a1a1a';
    const seedCount = 14;
    for (let i = 0; i < seedCount; i++) {
      const a = (i / seedCount) * Math.PI * 2;
      const dist = r * 0.45;
      const px = Math.cos(a) * dist;
      const py = Math.sin(a) * dist;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(a + Math.PI / 2);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.05, r * 0.025, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  },

  /** 番茄：红色 + 绿色蒂叶 */
  drawTomato(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 番茄的纵向沟纹
    ctx.strokeStyle = 'rgba(192, 57, 43, 0.3)';
    ctx.lineWidth = Math.max(1, r * 0.03);
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r * 0.2, Math.sin(a) * r * 0.2);
      ctx.quadraticCurveTo(
        Math.cos(a) * r * 0.6, Math.sin(a) * r * 0.6,
        Math.cos(a) * r * 0.95, Math.sin(a) * r * 0.95
      );
      ctx.stroke();
    }
    // 顶部绿色蒂叶（五角星状）
    ctx.fillStyle = '#27AE60';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      const px = Math.cos(a) * r * 0.35;
      const py = Math.sin(a) * r * 0.35 + r * 0.7;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#2ECC71';
    ctx.beginPath();
    ctx.arc(0, r * 0.7, r * 0.1, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 桃子：粉色 + 细绒毛感 + 凹槽 */
  drawPeach(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 桃子的纵向凹槽
    ctx.strokeStyle = 'rgba(233, 150, 122, 0.4)';
    ctx.lineWidth = Math.max(2, r * 0.04);
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.95);
    ctx.quadraticCurveTo(r * 0.05, 0, 0, r * 0.95);
    ctx.stroke();
    // 绒毛感小点
    ctx.fillStyle = 'rgba(245, 183, 177, 0.4)';
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      const dist = Math.random() * r * 0.85;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * dist, Math.sin(a) * dist, r * 0.02, 0, Math.PI * 2);
      ctx.fill();
    }
    // 叶子
    ctx.fillStyle = '#2ECC71';
    ctx.beginPath();
    ctx.ellipse(r * 0.15, -r * 0.95, r * 0.2, r * 0.08, 0.5, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 菠萝：金色 + 网格纹理 + 顶部叶冠 */
  drawPineapple(ctx, r, fruit) {
    // 主体椭圆
    const grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, lightenColor(fruit.color, 0.4));
    grad.addColorStop(0.5, fruit.color);
    grad.addColorStop(1, fruit.color2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, r * 0.05, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // 网格纹理（菱形格）
    ctx.strokeStyle = 'rgba(118, 86, 25, 0.35)';
    ctx.lineWidth = Math.max(1, r * 0.015);
    const step = r * 0.28;
    for (let row = -3; row <= 3; row++) {
      const y = row * step * 0.5;
      const offset = (row % 2) * step * 0.5;
      for (let col = -3; col <= 3; col++) {
        const x = col * step + offset;
        // 检查是否在菠萝范围内
        const dx = x / (r * 0.85);
        const dy = (y - r * 0.05) / r;
        if (dx * dx + dy * dy < 0.85) {
          ctx.beginPath();
          ctx.moveTo(x, y - step * 0.2);
          ctx.lineTo(x + step * 0.3, y);
          ctx.lineTo(x, y + step * 0.2);
          ctx.lineTo(x - step * 0.3, y);
          ctx.closePath();
          ctx.stroke();
          // 中心点
          ctx.fillStyle = 'rgba(118, 86, 25, 0.2)';
          ctx.beginPath();
          ctx.arc(x, y, r * 0.025, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // 顶部叶冠
    ctx.fillStyle = '#27AE60';
    for (let i = -2; i <= 2; i++) {
      ctx.save();
      ctx.translate(i * r * 0.12, -r * 0.9);
      ctx.rotate(i * 0.2);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-r * 0.08, -r * 0.35);
      ctx.lineTo(0, -r * 0.4);
      ctx.lineTo(r * 0.08, -r * 0.35);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#2ECC71';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.9);
    ctx.lineTo(-r * 0.06, -r * 1.25);
    ctx.lineTo(0, -r * 1.3);
    ctx.lineTo(r * 0.06, -r * 1.25);
    ctx.closePath();
    ctx.fill();
  },

  /** 哈密瓜：浅绿 + 网格纹路 */
  drawMelon(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 哈密瓜网纹
    ctx.strokeStyle = 'rgba(82, 190, 128, 0.35)';
    ctx.lineWidth = Math.max(1, r * 0.012);
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.ellipse(0, 0, r * (0.3 + i * 0.1), r * (0.3 + i * 0.1), i * 0.3, 0, Math.PI * 2);
      ctx.stroke();
    }
    // 随机网纹
    ctx.strokeStyle = 'rgba(40, 180, 99, 0.25)';
    for (let i = 0; i < 20; i++) {
      const x1 = (Math.random() - 0.5) * r * 1.6;
      const y1 = (Math.random() - 0.5) * r * 1.6;
      const x2 = x1 + (Math.random() - 0.5) * r * 0.4;
      const y2 = y1 + (Math.random() - 0.5) * r * 0.4;
      if (x1 * x1 + y1 * y1 < r * r * 0.8) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
    // 顶部蒂
    ctx.fillStyle = '#27AE60';
    ctx.beginPath();
    ctx.arc(0, -r * 0.92, r * 0.08, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 苹果：深红 + 凹陷 + 茎叶 */
  drawApple(ctx, r, fruit) {
    // 苹果略带心形轮廓
    const grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, lightenColor(fruit.color, 0.35));
    grad.addColorStop(0.5, fruit.color);
    grad.addColorStop(1, fruit.color2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    // 心形苹果轮廓
    ctx.moveTo(0, -r * 0.85);
    ctx.bezierCurveTo(-r * 0.3, -r * 1.05, -r * 1.0, -r * 0.8, -r * 0.95, -r * 0.1);
    ctx.bezierCurveTo(-r * 0.9, r * 0.6, -r * 0.4, r * 0.95, 0, r * 0.95);
    ctx.bezierCurveTo(r * 0.4, r * 0.95, r * 0.9, r * 0.6, r * 0.95, -r * 0.1);
    ctx.bezierCurveTo(r * 1.0, -r * 0.8, r * 0.3, -r * 1.05, 0, -r * 0.85);
    ctx.fill();
    // 顶部凹陷
    ctx.fillStyle = 'rgba(169, 50, 38, 0.3)';
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.82, r * 0.15, r * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    // 茎
    ctx.strokeStyle = '#6B4226';
    ctx.lineWidth = Math.max(2, r * 0.04);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.85);
    ctx.lineTo(r * 0.05, -r * 1.05);
    ctx.stroke();
    // 叶子
    ctx.fillStyle = '#2ECC71';
    ctx.beginPath();
    ctx.ellipse(r * 0.18, -r * 1.0, r * 0.15, r * 0.07, 0.4, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 西瓜：深绿 + 黑色条纹 */
  drawWatermelon(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
    // 西瓜条纹
    ctx.strokeStyle = 'rgba(20, 90, 50, 0.7)';
    ctx.lineWidth = Math.max(2, r * 0.035);
    const stripeCount = 12;
    for (let i = 0; i < stripeCount; i++) {
      const a = (i / stripeCount) * Math.PI * 2;
      ctx.beginPath();
      const startA = a - 0.08;
      const endA = a + 0.08;
      ctx.moveTo(Math.cos(startA) * r * 0.15, Math.sin(startA) * r * 0.15);
      ctx.quadraticCurveTo(
        Math.cos(a) * r * 0.55, Math.sin(a) * r * 0.55,
        Math.cos(endA) * r * 0.97, Math.sin(endA) * r * 0.97
      );
      ctx.stroke();
    }
    // 深色条纹中心
    ctx.strokeStyle = 'rgba(10, 60, 30, 0.5)';
    ctx.lineWidth = Math.max(1, r * 0.02);
    for (let i = 0; i < stripeCount; i++) {
      const a = (i / stripeCount) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r * 0.15, Math.sin(a) * r * 0.15);
      ctx.lineTo(Math.cos(a) * r * 0.95, Math.sin(a) * r * 0.95);
      ctx.stroke();
    }
    // 顶部蒂
    ctx.fillStyle = '#145A32';
    ctx.beginPath();
    ctx.arc(0, -r * 0.92, r * 0.07, 0, Math.PI * 2);
    ctx.fill();
  },

  /** 通用水果绘制（兜底） */
  drawGeneric(ctx, r, fruit) {
    this.fillRadialCircle(ctx, r, fruit.color, fruit.color2);
  },
};

/* ================================================================
 * 四、粒子系统（合并飞溅效果）
 * ================================================================ */

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 2;
    this.color = color;
    this.size = 3 + Math.random() * 5;
    this.life = 1.0;
    this.decay = 0.02 + Math.random() * 0.02;
    this.gravity = 0.15;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.96;
    this.life -= this.decay;
    return this.life > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

/* ================================================================
 * 五、合并动画管理器
 * ================================================================ */

class MergeAnimation {
  constructor(x, y, level) {
    this.x = x;
    this.y = y;
    this.level = level;
    this.progress = 0;
    this.duration = 25; // 帧数
    this.done = false;
  }

  update() {
    this.progress++;
    if (this.progress >= this.duration) this.done = true;
    return !this.done;
  }

  /** 获取当前缩放比例：先放大再回弹 */
  getScale() {
    const t = this.progress / this.duration;
    // 弹性曲线：快速放大到 1.3，然后回弹到 1
    if (t < 0.3) {
      return 1 + (t / 0.3) * 0.3;
    } else if (t < 0.6) {
      return 1.3 - ((t - 0.3) / 0.3) * 0.15;
    } else {
      return 1.15 - ((t - 0.6) / 0.4) * 0.15;
    }
  }

  draw(ctx) {
    const fruit = getFruitConfig(this.level);
    if (!fruit) return;
    const scale = this.getScale();
    const alpha = this.progress < this.duration * 0.7 ? 1 : 1 - (this.progress - this.duration * 0.7) / (this.duration * 0.3);
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    FruitRenderer.draw(ctx, this.x, this.y, fruit.radius, fruit, 0, scale);
    ctx.restore();
  }
}

/* ================================================================
 * 六、游戏主类
 * ================================================================ */

class WatermelonGame {
  constructor() {
    // Canvas
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.canvas.width = CANVAS_WIDTH;
    this.canvas.height = CANVAS_HEIGHT;

    // 预览 Canvas
    this.nextCanvas = document.getElementById('next-canvas');
    this.nextCtx = this.nextCanvas.getContext('2d');

    // 游戏状态
    this.score = 0;
    this.bestScore = parseInt(localStorage.getItem('watermelon_best_score') || '0', 10);
    this.gameOver = false;
    this.canDrop = true;
    this.lastDropTime = 0;

    // 当前水果
    this.currentLevel = randomSpawnLevel();
    this.nextLevel = randomSpawnLevel();
    this.dropX = CANVAS_WIDTH / 2;
    this.dropY = 50;

    // 物理引擎
    this.engine = null;
    this.world = null;

    // 动画 & 粒子
    this.mergeAnimations = [];
    this.particles = [];

    // 待合并队列（防止同一帧多次合并）
    this.pendingMerges = [];
    this.mergingBodies = new Set(); // 正在合并中的 body id
    this.dropCooldownTimer = null;  // 掉落冷却定时器 ID

    // DOM 元素
    this.scoreEl = document.getElementById('score-value');
    this.bestEl = document.getElementById('best-value');
    this.finalScoreEl = document.getElementById('final-score');
    this.finalBestEl = document.getElementById('final-best');
    this.overlayEl = document.getElementById('game-over-overlay');
    this.newRecordEl = document.getElementById('new-record-badge');
    this.restartBtn = document.getElementById('restart-btn');

    this.init();
  }

  /* ---------- 初始化 ---------- */

  init() {
    this.setupPhysics();
    this.setupWalls();
    this.setupCollision();
    this.setupInput();
    this.updateScoreDisplay();
    this.drawNextPreview();
    this.gameLoop = this.gameLoop.bind(this);
    requestAnimationFrame(this.gameLoop);
  }

  /** 初始化物理引擎 */
  setupPhysics() {
    this.engine = Engine.create();
    this.world = this.engine.world;
    this.engine.gravity.y = GRAVITY_Y;
  }

  /** 创建边界墙体 */
  setupWalls() {
    const wallOptions = {
      isStatic: true,
      friction: FRICTION,
      restitution: RESTITUTION,
      render: { visible: false },
    };
    // 左墙
    World.add(this.world, Bodies.rectangle(
      -WALL_THICKNESS / 2, CANVAS_HEIGHT / 2,
      WALL_THICKNESS, CANVAS_HEIGHT * 2,
      wallOptions
    ));
    // 右墙
    World.add(this.world, Bodies.rectangle(
      CANVAS_WIDTH + WALL_THICKNESS / 2, CANVAS_HEIGHT / 2,
      WALL_THICKNESS, CANVAS_HEIGHT * 2,
      wallOptions
    ));
    // 底墙
    World.add(this.world, Bodies.rectangle(
      CANVAS_WIDTH / 2, CANVAS_HEIGHT + WALL_THICKNESS / 2,
      CANVAS_WIDTH * 2, WALL_THICKNESS,
      wallOptions
    ));
  }

  /** 设置碰撞事件监听 */
  setupCollision() {
    Events.on(this.engine, 'collisionStart', (event) => {
      if (this.gameOver) return;
      for (const pair of event.pairs) {
        const a = pair.bodyA;
        const b = pair.bodyB;
        // 检查是否都是水果且同级
        if (a.fruitLevel && b.fruitLevel &&
            a.fruitLevel === b.fruitLevel &&
            a.fruitLevel < MAX_LEVEL &&
            !this.mergingBodies.has(a.id) &&
            !this.mergingBodies.has(b.id)) {
          this.scheduleMerge(a, b);
        }
      }
    });
  }

  /** 安排合并（加入队列，稍后处理避免物理状态冲突） */
  scheduleMerge(bodyA, bodyB) {
    // 标记为合并中，防止重复
    this.mergingBodies.add(bodyA.id);
    this.mergingBodies.add(bodyB.id);
    this.pendingMerges.push({ bodyA, bodyB });
  }

  /** 处理所有待合并 */
  processPendingMerges() {
    while (this.pendingMerges.length > 0) {
      const { bodyA, bodyB } = this.pendingMerges.shift();
      this.mergeFruits(bodyA, bodyB);
    }
  }

  /** 执行水果合并 */
  mergeFruits(bodyA, bodyB) {
    const level = bodyA.fruitLevel;
    const newLevel = level + 1;

    // 合并点位置
    const mergeX = (bodyA.position.x + bodyB.position.x) / 2;
    const mergeY = (bodyA.position.y + bodyB.position.y) / 2;

    // 移除旧水果
    World.remove(this.world, bodyA);
    World.remove(this.world, bodyB);
    this.mergingBodies.delete(bodyA.id);
    this.mergingBodies.delete(bodyB.id);

    // 创建新水果
    if (newLevel <= MAX_LEVEL) {
      const newBody = this.createFruit(mergeX, mergeY, newLevel);
      World.add(this.world, newBody);
    }

    // 添加合并动画
    this.mergeAnimations.push(new MergeAnimation(mergeX, mergeY, newLevel));

    // 添加粒子飞溅
    const oldFruit = getFruitConfig(level);
    const particleCount = 12 + level * 2;
    for (let i = 0; i < particleCount; i++) {
      this.particles.push(new Particle(mergeX, mergeY, oldFruit.color));
      this.particles.push(new Particle(mergeX, mergeY, lightenColor(oldFruit.color, 0.3)));
    }

    // 加分
    let gained = level * 10;
    if (newLevel === MAX_LEVEL) {
      gained += WATERMELON_BONUS;
    }
    this.score += gained;
    this.updateScoreDisplay();
  }

  /** 创建水果物理体 */
  createFruit(x, y, level) {
    const fruit = getFruitConfig(level);
    const body = Bodies.circle(x, y, fruit.radius, {
      restitution: RESTITUTION,
      friction: FRICTION,
      frictionStatic: 0.1,
      density: 0.001 + level * 0.0002,
      label: 'fruit',
    });
    body.fruitLevel = level;
    body.fruitRadius = fruit.radius;
    body.createdAt = performance.now();
    return body;
  }

  /* ---------- 输入处理 ---------- */

  setupInput() {
    // 鼠标移动
    this.canvas.addEventListener('mousemove', (e) => {
      if (this.gameOver) return;
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      this.dropX = clamp((e.clientX - rect.left) * scaleX, this.getCurrentRadius(), CANVAS_WIDTH - this.getCurrentRadius());
    });

    // 鼠标点击掉落
    this.canvas.addEventListener('click', (e) => {
      if (this.gameOver) return;
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      this.dropX = clamp((e.clientX - rect.left) * scaleX, this.getCurrentRadius(), CANVAS_WIDTH - this.getCurrentRadius());
      this.dropFruit();
    });

    // 触摸控制
    this.canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (this.gameOver) return;
      const touch = e.touches[0];
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      this.dropX = clamp((touch.clientX - rect.left) * scaleX, this.getCurrentRadius(), CANVAS_WIDTH - this.getCurrentRadius());
    }, { passive: false });

    this.canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (this.gameOver) return;
      const touch = e.touches[0];
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      this.dropX = clamp((touch.clientX - rect.left) * scaleX, this.getCurrentRadius(), CANVAS_WIDTH - this.getCurrentRadius());
    }, { passive: false });

    this.canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (this.gameOver) return;
      this.dropFruit();
    }, { passive: false });

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (this.gameOver) return;
      const step = 20;
      if (e.key === 'ArrowLeft') {
        this.dropX = clamp(this.dropX - step, this.getCurrentRadius(), CANVAS_WIDTH - this.getCurrentRadius());
      } else if (e.key === 'ArrowRight') {
        this.dropX = clamp(this.dropX + step, this.getCurrentRadius(), CANVAS_WIDTH - this.getCurrentRadius());
      } else if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        this.dropFruit();
      }
    });

    // 重新开始按钮
    this.restartBtn.addEventListener('click', () => {
      this.restart();
    });
  }

  /** 获取当前待掉落水果半径 */
  getCurrentRadius() {
    return getFruitConfig(this.currentLevel).radius;
  }

  /** 掉落水果 */
  dropFruit() {
    if (!this.canDrop || this.gameOver) return;
    const now = performance.now();
    if (now - this.lastDropTime < DROP_COOLDOWN) return;

    this.lastDropTime = now;
    this.canDrop = false;

    // 创建水果并加入物理世界
    const body = this.createFruit(this.dropX, this.dropY, this.currentLevel);
    World.add(this.world, body);

    // 切换到下一个水果
    this.currentLevel = this.nextLevel;
    this.nextLevel = randomSpawnLevel();
    this.drawNextPreview();

    // 冷却倒计时
    this.dropCooldownTimer = setTimeout(() => {
      this.canDrop = true;
      this.dropCooldownTimer = null;
    }, DROP_COOLDOWN);
  }

  /* ---------- 游戏结束检测 ---------- */

  checkGameOver() {
    if (this.gameOver) return;
    const now = performance.now();
    const bodies = Composite.allBodies(this.world);
    for (const body of bodies) {
      if (!body.fruitLevel) continue;
      // 跳过刚创建的水果（1秒内），避免误判正在下落的水果
      if (now - body.createdAt < 1000) continue;
      // 检测是否基本静止
      const speed = Math.sqrt(body.velocity.x ** 2 + body.velocity.y ** 2);
      // 水果静止且中心点超过警戒线（y < DANGER_LINE_Y 表示在警戒线上方）
      if (speed < 0.8 && body.position.y < DANGER_LINE_Y) {
        this.triggerGameOver();
        return;
      }
    }
  }

  /** 触发游戏结束 */
  triggerGameOver() {
    this.gameOver = true;
    const isNewRecord = this.score > this.bestScore;
    if (isNewRecord) {
      this.bestScore = this.score;
      localStorage.setItem('watermelon_best_score', String(this.bestScore));
    }
    this.finalScoreEl.textContent = this.score;
    this.finalBestEl.textContent = this.bestScore;
    this.newRecordEl.classList.toggle('show', isNewRecord);
    this.overlayEl.classList.add('show');
  }

  /** 重新开始 */
  restart() {
    // 清除所有水果
    const bodies = Composite.allBodies(this.world);
    for (const body of bodies) {
      if (body.fruitLevel) {
        World.remove(this.world, body);
      }
    }
    // 重置状态
    clearTimeout(this.dropCooldownTimer);
    this.dropCooldownTimer = null;
    this.score = 0;
    this.gameOver = false;
    this.canDrop = true;
    this.lastDropTime = 0;
    this.currentLevel = randomSpawnLevel();
    this.nextLevel = randomSpawnLevel();
    this.dropX = CANVAS_WIDTH / 2;
    this.mergeAnimations = [];
    this.particles = [];
    this.pendingMerges = [];
    this.mergingBodies.clear();

    this.updateScoreDisplay();
    this.drawNextPreview();
    this.overlayEl.classList.remove('show');
  }

  /* ---------- UI 更新 ---------- */

  updateScoreDisplay() {
    this.scoreEl.textContent = this.score;
    this.bestEl.textContent = this.bestScore;
  }

  /** 绘制下一个水果预览 */
  drawNextPreview() {
    const ctx = this.nextCtx;
    const fruit = getFruitConfig(this.nextLevel);
    ctx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
    const cx = this.nextCanvas.width / 2;
    const cy = this.nextCanvas.height / 2;
    const previewRadius = 18;
    const scale = previewRadius / fruit.radius;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    FruitRenderer.draw(ctx, 0, 0, fruit.radius, fruit, 0, 1);
    ctx.restore();
  }

  /* ---------- 渲染 ---------- */

  /** 绘制背景装饰 */
  drawBackground(ctx) {
    // 背景已由 CSS 渐变提供，这里画一些微妙装饰
    // 顶部渐变光晕
    const topGrad = ctx.createLinearGradient(0, 0, 0, DANGER_LINE_Y);
    topGrad.addColorStop(0, 'rgba(255, 182, 193, 0.12)');
    topGrad.addColorStop(1, 'rgba(255, 182, 193, 0)');
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, CANVAS_WIDTH, DANGER_LINE_Y);
  }

  /** 绘制警戒线 */
  drawDangerLine(ctx) {
    ctx.save();
    ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(0, DANGER_LINE_Y);
    ctx.lineTo(CANVAS_WIDTH, DANGER_LINE_Y);
    ctx.stroke();
    ctx.restore();

    // 警戒线标签
    ctx.save();
    ctx.fillStyle = 'rgba(231, 76, 60, 0.6)';
    ctx.font = '11px "Baloo 2", sans-serif';
    ctx.fillText('⚠ 警戒线', CANVAS_WIDTH - 70, DANGER_LINE_Y - 6);
    ctx.restore();
  }

  /** 绘制掉落指引线 */
  drawGuideLine(ctx) {
    if (this.gameOver) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 107, 157, 0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    const r = this.getCurrentRadius();
    ctx.moveTo(this.dropX, this.dropY + r);
    ctx.lineTo(this.dropX, CANVAS_HEIGHT);
    ctx.stroke();
    ctx.restore();
  }

  /** 绘制待掉落水果（顶部） */
  drawCurrentFruit(ctx) {
    if (this.gameOver) return;
    const fruit = getFruitConfig(this.currentLevel);
    // 冷却期间半透明
    const alpha = this.canDrop ? 1 : 0.4;
    ctx.save();
    ctx.globalAlpha = alpha;
    FruitRenderer.draw(ctx, this.dropX, this.dropY, fruit.radius, fruit, 0, 1);
    ctx.restore();
  }

  /** 绘制所有物理水果 */
  drawFruits(ctx) {
    const bodies = Composite.allBodies(this.world);
    for (const body of bodies) {
      if (!body.fruitLevel) continue;
      const fruit = getFruitConfig(body.fruitLevel);
      const angle = body.angle;
      FruitRenderer.draw(ctx, body.position.x, body.position.y, fruit.radius, fruit, angle, 1);
    }
  }

  /** 更新和绘制粒子 */
  updateAndDrawParticles(ctx) {
    this.particles = this.particles.filter(p => {
      const alive = p.update();
      if (alive) p.draw(ctx);
      return alive;
    });
  }

  /** 更新和绘制合并动画 */
  updateAndDrawMergeAnimations(ctx) {
    this.mergeAnimations = this.mergeAnimations.filter(anim => {
      const alive = anim.update();
      if (alive) anim.draw(ctx);
      return alive;
    });
  }

  /* ---------- 主循环 ---------- */

  gameLoop(timestamp) {
    // 物理更新
    if (!this.gameOver) {
      Engine.update(this.engine, 1000 / 60);
      this.processPendingMerges();
      this.checkGameOver();
    } else {
      // 游戏结束后仍然更新物理（让水果落定）
      Engine.update(this.engine, 1000 / 60);
      this.processPendingMerges();
    }

    // 渲染
    const ctx = this.ctx;
    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    this.drawBackground(ctx);
    this.drawDangerLine(ctx);
    this.drawGuideLine(ctx);
    this.drawFruits(ctx);
    this.updateAndDrawMergeAnimations(ctx);
    this.updateAndDrawParticles(ctx);
    this.drawCurrentFruit(ctx);

    requestAnimationFrame(this.gameLoop);
  }
}

/* ================================================================
 * 七、启动游戏
 * ================================================================ */

// 等待 Matter.js 加载完成
function startGame() {
  if (typeof Matter === 'undefined') {
    // Matter.js 尚未加载，稍后重试
    setTimeout(startGame, 50);
    return;
  }
  // 确保 Matter 模块已解构可用
  if (!Matter.Engine) {
    setTimeout(startGame, 50);
    return;
  }
  window.game = new WatermelonGame();
}

// DOM 就绪后启动
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startGame);
} else {
  startGame();
}
</script>

</body>
</html>
